services:
  postgres:
    image: postgres:17-alpine
    container_name: cryplio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: parvej
      POSTGRES_DB: cryplio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryplio_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cryplio-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: golang:1.25
    container_name: cryplio-api
    working_dir: /app
    command: sh -c "go run ./cmd/api"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: parvej
      DB_NAME: cryplio_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: development
      APP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    container_name: cryplio-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      API_GATEWAY_URL: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
