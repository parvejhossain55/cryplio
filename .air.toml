root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/api ./cmd/api"
bin = "./tmp/air/api"
full_bin = "./tmp/air/api"
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["apps", "contracts", "docs", "node_modules", "tmp", "tests", ".git", ".next"]
exclude_file = []
exclude_regex = []
exclude_unchanged = false
follow_symlink = false
log = "build-errors.log"
delay = 300
stop_on_root = false
send_interrupt = true
kill_delay = 500

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"

[misc]
clean_on_exit = true
